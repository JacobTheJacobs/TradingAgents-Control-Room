services:
  # Backend API + built frontend - http://localhost:8001
  ai-hedge-fund:
    build:
      context: ..
      dockerfile: src/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - FINANCE_DB_URL=https://admin.fin-node.net
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-trading_floor}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    env_file:
      - ../.env
    volumes:
      - ../src:/app/src
      - ../static:/app/static
      - ../data:/app/data
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=trading_floor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
