services:
  # React Dev Server - http://localhost:3000
  control-room-ui:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./v3/react-app:/app
      - control_room_ui_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && rm -rf /app/node_modules/.vite /tmp/vite* && npm run dev -- --host 0.0.0.0 --port 3000 --force"
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_PROXY_TARGET=http://host.docker.internal:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Backend API - http://localhost:8001
  control-room-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - FINANCE_DB_URL=${FINANCE_DB_URL:-https://example-finance-api.local}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-trading_floor}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    env_file:
      - ./.env
    volumes:
      - ./:/app/src
      - ./static:/app/static
      - analytics_data:/app/data
      - tradingagents_runs:/shared/tradingagents-runs
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=trading_floor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_floor"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  analytics_data:
  tradingagents_runs:
  control_room_ui_node_modules:
